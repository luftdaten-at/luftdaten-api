services:
  app:
    image: luftdaten/api:staging
    restart: unless-stopped
    command: /bin/sh -c "alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 80 --reload & (python download_csv.py && python import_from_csv.py)"
    expose:
      - 80
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.luftdaten-api-staging.entrypoints=https"
      - "traefik.http.routers.luftdaten-api-staging.rule=(Host(`staging.api.luftdaten.at`))"
      - "traefik.http.routers.luftdaten-api-staging.tls=true"
      - "traefik.http.routers.luftdaten-api-staging.tls.certresolver=http"
      - "traefik.http.routers.luftdaten-api-staging.service=luftdaten-api-staging"
      - "traefik.http.services.luftdaten-api-staging.loadbalancer.server.port=80"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.luftdaten-api-staging.middlewares=default@file"
    networks:
      - default
      - proxy
    depends_on:
      - db
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health/simple"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
  db:
    image: postgres:16
    # Default 64MB /dev/shm is too small for Postgres under load (avoids DiskFullError on shm resize)
    shm_size: "256mb"
    networks:
      - default
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
  admin:
    image: dpage/pgadmin4:latest
    env_file:
      - .env
    depends_on:
      - db
    volumes:
      - ./pgadmin-data/:/var/lib/pgadmin/
    labels:  
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.luftdaten-api-staging-admin.entrypoints=https"
      - "traefik.http.routers.luftdaten-api-staging-admin.rule=Host(`admin.staging.api.luftdaten.at`)"
      - "traefik.http.routers.luftdaten-api-staging-admin.tls=true"
      - "traefik.http.routers.luftdaten-api-staging-admin.tls.certresolver=http"
      - "traefik.http.routers.luftdaten-api-staging-admin.service=luftdaten-api-staging-admin"
      - "traefik.http.services.luftdaten-api-staging-admin.loadbalancer.server.port=80"
      - "traefik.http.routers.luftdaten-api-staging-admin.middlewares=default@file"
      - "com.centurylinklabs.watchtower.enable=true" # Hiermit wird dieser Service explizit automatisiert aktualisiert.
    networks:
      - proxy
      - default

  # Monitoring — enable with: docker compose -f docker-compose.prod.yml --profile monitoring up -d
  # Requires ./monitoring/ from the repo (prometheus.yml, rules.yml, grafana provisioning).
  # Grafana: Traefik host below; add ports: ["127.0.0.1:3000:3000"] if you need direct local access.
  postgres_exporter:
    profiles:
      - monitoring
    image: prometheuscommunity/postgres-exporter:latest
    restart: unless-stopped
    environment:
      DATA_SOURCE_URI: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-postgres}?sslmode=disable
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - default
  prometheus:
    profiles:
      - monitoring
    image: prom/prometheus:latest
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/prometheus/rules.yml:/etc/prometheus/rules.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    depends_on:
      app:
        condition: service_healthy
    networks:
      - default
  grafana:
    profiles:
      - monitoring
    image: grafana/grafana:latest
    restart: unless-stopped
    expose:
      - 80
    env_file:
      - .env
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.luftdaten-api-staging-grafana.entrypoints=https"
      - "traefik.http.routers.luftdaten-api-staging-grafana.rule=Host(`grafana.staging.api.luftdaten.at`)"
      - "traefik.http.routers.luftdaten-api-staging-grafana.tls=true"
      - "traefik.http.routers.luftdaten-api-staging-grafana.tls.certresolver=https"
      - "traefik.http.routers.luftdaten-api-staging-grafana.service=luftdaten-api-staging-grafana"
      - "traefik.http.services.luftdaten-api-staging-grafana.loadbalancer.server.port=80"
      - "traefik.http.routers.luftdaten-api-staging-grafana.middlewares=default@file"
    depends_on:
      - prometheus
    networks:
      - default
      - proxy

volumes:
  postgres_data:
  prometheus_data:

networks:
  default:
  proxy:
    external: true
