services:
  app:
    build: .
    command: uvicorn main:app --host 0.0.0.0 --port 80 --reload
    ports:
      - "80:80"
    volumes:
      - ./code:/usr/src/app
      - ./config:/usr/src/config
    depends_on:
      - db
    env_file:
      - .env
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health/simple"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
  db:
    image: postgres:16
    # Default 64MB /dev/shm is too small for Postgres under load (avoids DiskFullError on shm resize)
    shm_size: "256mb"
    ports:
     - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
  db_test:
    image: postgres:16
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
      POSTGRES_DB: test_database
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user -d test_database"]
      interval: 5s
      timeout: 5s
      retries: 5
  test:
    build: .
    command: pytest tests/ -v --durations=0
    volumes:
      - ./code:/usr/src/app
    working_dir: /usr/src/app
    depends_on:
      db_test:
        condition: service_healthy
    networks:
      - internal
    environment:
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
      DB_HOST: db_test
      POSTGRES_DB: test_database
      PYTHONPATH: /usr/src/app

  # Monitoring stack — use: docker compose --profile monitoring up -d
  postgres_exporter:
    profiles:
      - monitoring
    image: prometheuscommunity/postgres-exporter:latest
    environment:
      DATA_SOURCE_URI: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-postgres}?sslmode=disable
    ports:
      - "9187:9187"
    depends_on:
      - db
    networks:
      - internal
  prometheus:
    profiles:
      - monitoring
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/prometheus/rules.yml:/etc/prometheus/rules.yml
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    depends_on:
      - app
    networks:
      - internal
  grafana:
    profiles:
      - monitoring
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
    networks:
      - internal

networks:
  internal:

volumes:
  postgres_data:
  postgres_test_data: