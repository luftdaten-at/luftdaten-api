# Prometheus configuration for Luftdaten API monitoring
# Scrapes FastAPI app metrics and postgres_exporter

rule_files:
  - /etc/prometheus/rules.yml

scrape_configs:
  - job_name: "luftdaten-api"
    static_configs:
      - targets: ["app:80"]
    metrics_path: "/metrics"
    scrape_interval: 15s
    scrape_timeout: 10s

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres_exporter:9187"]
    scrape_interval: 15s
    scrape_timeout: 10s
